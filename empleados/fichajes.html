<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <meta name="description" content="Consulta tu historial de fichajes, horas trabajadas y control horario en clockInTime.">
    <meta name="keywords" content="clockInTime, fichajes, historial, control horario, empleados, horas trabajadas">
    <meta name="author" content="clockInTime">
    <meta name="theme-color" content="#0056b3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Fichajes - clockInTime">
    <meta property="og:description" content="Consulta tu historial de fichajes, horas trabajadas y control horario en clockInTime.">
    <meta property="og:image" content="https://iili.io/fzg2rNt.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Fichajes - clockInTime">
    <meta name="twitter:description" content="Consulta tu historial de fichajes, horas trabajadas y control horario en clockInTime.">
    <meta name="twitter:image" content="https://iili.io/fzg2rNt.png">    <title>Mis Fichajes - clockInTime</title>
    <link rel="stylesheet" href="../CSS/app-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="logo">clockInTime</a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li><a href="fichajes.html" class="active"><i class="fas fa-history"></i> Mis Fichajes</a></li>
                    <li><a href="solicitudes.html"><i class="fas fa-calendar-alt"></i> Solicitudes</a></li>
                    <li><a href="calendario.html"><i class="fas fa-calendar-week"></i> Calendario</a></li>
                    <li><a href="tareas.html"><i class="fas fa-tasks"></i> Mis Tareas</a></li>
                    <li><a href="mi-perfil.html"><i class="fas fa-user"></i> Mi Perfil</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="../login/login.html"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">

                    <h1>Mis Fichajes</h1>
                </div>
                <div class="user-info"><strong id="user-name-header">Empleado</strong></div>
            </header>

            <section class="widget">
                <div class="widget-header">
                    <h2>Historial de Registros</h2>
                    <div class="date-filter">
                        <label for="start-date">Desde:</label>
                        <input type="date" id="start-date">
                        <label for="end-date">Hasta:</label>
                        <input type="date" id="end-date">
                        <button id="btn-filter-fichajes" class="btn-filter">Filtrar</button>
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Fecha</th><th>Entrada</th><th>Salida</th>
                                <th>Pausas</th><th>Total Horas</th><th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="fichajes-tbody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <footer class="legal-footer">
        <a href="../legal/terminos-servicio.html">Términos de Servicio</a>
        <a href="../legal/politica-privacidad.html">Política de Privacidad</a>
        <a href="../legal/politica-cookies.html">Política de Cookies</a>
    </footer>

    <script src="../js/fichajes.js"></script>
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        menuToggle?.addEventListener('click', () => { sidebar.classList.add('active'); overlay.classList.add('active'); });
        overlay?.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
        const currentEmail = localStorage.getItem('currentUserEmail');
        if (currentEmail) { const u = JSON.parse(localStorage.getItem(currentEmail)); if (u) document.getElementById('user-name-header').textContent = u.fullname || u.email; }
    </script>
</body>
</html>
