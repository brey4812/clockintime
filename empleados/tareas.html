<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Organiza tus tareas, proyectos y pendientes en el tablero de clockInTime.">
    <meta name="keywords" content="clockInTime, tareas, proyectos, kanban, productividad, empleados">
    <meta name="author" content="clockInTime">
    <meta name="theme-color" content="#0056b3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Mis Tareas - clockInTime">
    <meta property="og:description" content="Organiza tus tareas, proyectos y pendientes en el tablero de clockInTime.">
    <meta property="og:image" content="https://iili.io/fzg2rNt.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Mis Tareas - clockInTime">
    <meta name="twitter:description" content="Organiza tus tareas, proyectos y pendientes en el tablero de clockInTime.">
    <meta name="twitter:image" content="https://iili.io/fzg2rNt.png">
    <title>Mis Tareas - clockInTime</title>
    <link rel="stylesheet" href="../CSS/app-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="logo">clockInTime</a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li><a href="fichajes.html"><i class="fas fa-history"></i> Mis Fichajes</a></li>
                    <li><a href="solicitudes.html"><i class="fas fa-calendar-alt"></i> Solicitudes</a></li>
                    <li><a href="calendario.html"><i class="fas fa-calendar-week"></i> Calendario</a></li>
                    <li><a href="tareas.html" class="active"><i class="fas fa-tasks"></i> Mis Tareas</a></li>
                    <li><a href="mi-perfil.html"><i class="fas fa-user"></i> Mi Perfil</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="../login/login.html"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <h1>Mis Tareas</h1>
                </div>
                <button id="btn-open-task-modal" class="btn-primary-app" style="padding:0.5rem 1rem;font-size:0.9rem;">
                    <i class="fas fa-plus"></i> Nueva Tarea
                </button>
            </header>

            <div class="kanban-board-container">
                <div class="kanban-board">
                    <div class="kanban-column">
                        <h2 class="kanban-column-title">Pendientes</h2>
                        <div id="kanban-content-todo" class="kanban-column-content"></div>
                    </div>
                    <div class="kanban-column">
                        <h2 class="kanban-column-title">En Progreso</h2>
                        <div id="kanban-content-doing" class="kanban-column-content"></div>
                    </div>
                    <div class="kanban-column">
                        <h2 class="kanban-column-title">Terminado</h2>
                        <div id="kanban-content-done" class="kanban-column-content"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Nueva Tarea -->
    <div class="modal-overlay modal-hidden" id="task-modal">
        <div class="modal-content">
            <button id="btn-close-task-modal" class="modal-close"><i class="fas fa-times"></i></button>
            <h2>Nueva Tarea</h2>
            <form id="new-task-form">
                <div class="form-group-app">
                    <label for="task-title">Título *</label>
                    <input type="text" id="task-title" placeholder="Ej. Diseñar la landing page" required>
                </div>
                <div class="form-group-app">
                    <label for="task-desc">Descripción</label>
                    <textarea id="task-desc" rows="3" placeholder="Más detalles..."></textarea>
                </div>
                <div class="form-group-app">
                    <label for="task-priority">Prioridad</label>
                    <select id="task-priority">
                        <option value="low">Baja</option>
                        <option value="medium" selected>Media</option>
                        <option value="high">Alta</option>
                    </select>
                </div>
                <div class="form-group-app">
                    <label for="task-column">Estado</label>
                    <select id="task-column">
                        <option value="todo" selected>Pendiente</option>
                        <option value="doing">En Progreso</option>
                        <option value="done">Terminado</option>
                    </select>
                </div>
                <div style="display:flex;gap:1rem;margin-top:1rem;">
                    <button id="btn-cancel-task" type="button" class="btn-primary-app" style="background:#64748b;">Cancelar</button>
                    <button id="btn-submit-task" type="submit" class="btn-primary-app">Crear Tarea</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="legal-footer">
        <a href="../legal/terminos-servicio.html">Términos de Servicio</a>
        <a href="../legal/politica-privacidad.html">Política de Privacidad</a>
        <a href="../legal/politica-cookies.html">Política de Cookies</a>
    </footer>

    <script src="../js/tareas.js"></script>
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        menuToggle?.addEventListener('click', () => { sidebar.classList.add('active'); overlay.classList.add('active'); });
        overlay?.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
    </script>
</body>
</html>
