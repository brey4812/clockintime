<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Resumen de fichajes, estado del equipo y accesos rápidos en clockInTime.">
    <meta name="keywords" content="clockInTime, dashboard, fichajes, horas trabajadas, empleados, control horario">
    <meta name="author" content="clockInTime">
    <meta name="theme-color" content="#0056b3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="Dashboard - clockInTime">
    <meta property="og:description" content="Resumen de fichajes, estado del equipo y accesos rápidos en clockInTime.">
    <meta property="og:image" content="https://iili.io/fzg2rNt.png">
    
    <title>Dashboard - clockInTime</title>
    
    <link rel="stylesheet" href="../CSS/app-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="../js/theme.js"></script>

    <style>
        .summary-value { font-variant-numeric: tabular-nums; font-weight: bold; }
        .btn-clock-green { background-color: #28a745; color: white; border: none; }
        .btn-clock-green:disabled { background-color: #a8d5b4; cursor: not-allowed; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 0.85rem; font-weight: 600; }
        .status-in { background: #e6fffa; color: #28a745; border: 1px solid #28a745; }
        .status-out { background: #fff5f5; color: #dc3545; border: 1px solid #dc3545; }
        .status-pause { background: #fffaf0; color: #f5a623; border: 1px solid #f5a623; }
        
        /* Ajuste para el botón de menú en móviles */
        .btn-menu { background: none; border: none; color: var(--text-main); font-size: 1.5rem; cursor: pointer; margin-right: 1rem; }
        @media (min-width: 1025px) { .btn-menu { display: none; } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="logo">clockInTime</a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li><a href="fichajes.html"><i class="fas fa-history"></i> Mis Fichajes</a></li>
                    <li><a href="solicitudes.html"><i class="fas fa-calendar-alt"></i> Solicitudes</a></li>
                    <li><a href="calendario.html" class="active"><i class="fas fa-calendar-week"></i> Calendario</a></li>
                    <li><a href="tareas.html"><i class="fas fa-tasks"></i> Mis Tareas</a></li>
                    <li><a href="mi-perfil.html"><i class="fas fa-user"></i> Mi Perfil</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="btn-logout"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <h1>Dashboard</h1>
                </div>
                <div class="user-info">Bienvenido, <strong id="user-name-header">Empleado</strong></div>
            </header>

            <section class="widget clock-in-widget">
                <h2>Registra tu jornada</h2>
                <div class="clock-status" style="margin-bottom: 1.5rem;">
                    Estado actual: <span id="clock-status-badge" class="status-badge status-out">Fuera del trabajo</span>
                </div>
                
                <div class="main-clock-display" style="text-align: center; margin-bottom: 1rem;">
                    <div id="summary-horas-hoy" style="font-size: 3rem; font-weight: bold; color: var(--primary-color); font-variant-numeric: tabular-nums;">0h 00m 00s</div>
                </div>

                <div style="display: flex; flex-direction: column; gap: 1rem; align-items: center;">
                    <button id="btn-clock-in" class="btn-clock-in btn-clock-green" style="width: 100%; max-width: 300px; padding: 1rem; font-size: 1.1rem; border-radius: 8px; cursor: pointer;">
                        <i class="fas fa-play"></i> Fichar Entrada
                    </button>
                    
                    <div class="clock-buttons-secondary" style="display: flex; gap: 1rem; width: 100%; max-width: 300px;">
                        <button id="btn-pause" class="btn-pause" disabled style="flex: 1; padding: 0.8rem; border-radius: 8px; cursor: pointer;"><i class="fas fa-pause"></i> Pausa</button>
                        <button id="btn-end" class="btn-end" disabled style="flex: 1; padding: 0.8rem; border-radius: 8px; cursor: pointer; background: #dc3545; color: white; border: none;"><i class="fas fa-stop"></i> Finalizar</button>
                    </div>
                </div>
            </section>

            <section class="widget-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 1.5rem;">
                <div class="widget summary-widget">
                    <h3>Horas Semana</h3>
                    <div id="summary-horas-semana" class="summary-value" style="font-size: 1.5rem; margin-top: 0.5rem;">0h 00m 00s</div>
                </div>
                <div class="widget summary-widget">
                    <h3>Próximo Evento / Proyecto</h3>
                    <div id="summary-proximas-ausencias" class="summary-value small" style="font-size: 0.9rem; color: var(--text-light); margin-top: 0.5rem;">No hay eventos hoy</div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="../js/dashboard.js"></script>
    
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        
        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        menuToggle?.addEventListener('click', toggleMenu);
        overlay?.addEventListener('click', toggleMenu);
    </script>
</body>
</html>
