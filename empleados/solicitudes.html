<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes - clockInTime</title>
    <link rel="stylesheet" href="../CSS/app-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="logo">clockInTime</a>
                <button class="sidebar-close-btn" id="sidebar-close"><i class="fas fa-times"></i></button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li><a href="fichajes.html"><i class="fas fa-history"></i> Mis Fichajes</a></li>
                    <li><a href="solicitudes.html" class="active"><i class="fas fa-calendar-alt"></i> Solicitudes</a></li>
                    <li><a href="calendario.html"><i class="fas fa-calendar-week"></i> Calendario</a></li>
                    <li><a href="tareas.html"><i class="fas fa-tasks"></i> Mis Tareas</a></li>
                    <li><a href="mi-perfil.html"><i class="fas fa-user"></i> Mi Perfil</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="../login/login.html"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="menu-toggle-btn" id="menu-toggle"><i class="fas fa-bars"></i></button>
                    <h1>Solicitudes de Ausencia</h1>
                </div>
                <div class="user-info"><strong id="user-name-header">Empleado</strong></div>
            </header>

            <div class="page-grid-solicitudes">
                <div class="widget">
                    <h2>Nueva Solicitud</h2>
                    <form id="request-form">
                        <div class="form-group-app">
                            <label for="request-type">Tipo de Ausencia</label>
                            <select id="request-type">
                                <option value="vacaciones">Vacaciones</option>
                                <option value="asuntos-propios">Asuntos Propios</option>
                                <option value="baja-medica">Baja Médica</option>
                                <option value="teletrabajo">Día de Teletrabajo</option>
                            </select>
                        </div>
                        <div class="date-inputs">
                            <div class="form-group-app">
                                <label for="start-date">Fecha Inicio</label>
                                <input type="date" id="start-date">
                            </div>
                            <div class="form-group-app">
                                <label for="end-date">Fecha Fin</label>
                                <input type="date" id="end-date">
                            </div>
                        </div>
                        <div class="form-group-app">
                            <label for="comments">Comentarios (Opcional)</label>
                            <textarea id="comments" rows="4" placeholder="Ej. Cita médica"></textarea>
                        </div>
                        <button id="btn-submit-request" type="submit" class="btn-primary-app">Enviar Solicitud</button>
                    </form>
                </div>

                <div class="widget">
                    <h2>Historial</h2>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr><th>Tipo</th><th>Desde</th><th>Hasta</th><th>Estado</th></tr>
                            </thead>
                            <tbody id="historial-solicitudes-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="legal-footer">
        <a href="../legal/terminos-servicio.html">Términos de Servicio</a>
        <a href="../legal/politica-privacidad.html">Política de Privacidad</a>
        <a href="../legal/politica-cookies.html">Política de Cookies</a>
    </footer>

    <script src="../js/solicitudes.js"></script>
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const closeBtn = document.getElementById('sidebar-close');
        menuToggle?.addEventListener('click', () => { sidebar.classList.add('active'); overlay.classList.add('active'); });
        overlay?.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
        closeBtn?.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
        const currentEmail = localStorage.getItem('currentUserEmail');
        if (currentEmail) { const u = JSON.parse(localStorage.getItem(currentEmail)); if (u) document.getElementById('user-name-header').textContent = u.fullname || u.email; }
    </script>
</body>
</html>
