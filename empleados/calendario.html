<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Consulta tu calendario laboral, turnos y vacaciones en clockInTime.">
    <meta name="keywords" content="clockInTime, calendario laboral, turnos, vacaciones, empresa, planificación">
    <meta name="author" content="clockInTime">
    <meta name="theme-color" content="#0056b3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Calendario - clockInTime">
    <meta property="og:description" content="Consulta tu calendario laboral, turnos y vacaciones en clockInTime.">
    <meta property="og:image" content="https://iili.io/fzg2rNt.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Calendario - clockInTime">
    <meta name="twitter:description" content="Consulta tu calendario laboral, turnos y vacaciones en clockInTime.">
    <meta name="twitter:image" content="https://iili.io/fzg2rNt.png">
    <title>Calendario - clockInTime</title>
    <link rel="stylesheet" href="../CSS/app-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="logo">clockInTime</a>
                <button class="sidebar-close-btn" id="sidebar-close"><i class="fas fa-times"></i></button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li><a href="fichajes.html"><i class="fas fa-history"></i> Mis Fichajes</a></li>
                    <li><a href="solicitudes.html"><i class="fas fa-calendar-alt"></i> Solicitudes</a></li>
                    <li><a href="calendario.html" class="active"><i class="fas fa-calendar-week"></i> Calendario</a></li>
                    <li><a href="tareas.html"><i class="fas fa-tasks"></i> Mis Tareas</a></li>
                    <li><a href="mi-perfil.html"><i class="fas fa-user"></i> Mi Perfil</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="../login/login.html"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <h1>Calendario</h1>
                </div>
                <div class="user-info"><strong id="user-name-header">Empleado</strong></div>
            </header>

            <div class="widget">
                <div class="calendar-header">
                    <button id="btn-cal-prev" class="btn-calendar-nav"><i class="fas fa-chevron-left"></i></button>
                    <h2 id="calendar-month-year">Cargando...</h2>
                    <button id="btn-cal-next" class="btn-calendar-nav"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div id="calendar-grid-body" class="calendar-grid">
                    <div class="day-header">Lunes</div>
                    <div class="day-header">Martes</div>
                    <div class="day-header">Miércoles</div>
                    <div class="day-header">Jueves</div>
                    <div class="day-header">Viernes</div>
                    <div class="day-header">Sábado</div>
                    <div class="day-header">Domingo</div>
                </div>
            </div>
        </main>
    </div>

    <footer class="legal-footer">
        <a href="../legal/terminos-servicio.html">Términos de Servicio</a>
        <a href="../legal/politica-privacidad.html">Política de Privacidad</a>
        <a href="../legal/politica-cookies.html">Política de Cookies</a>
    </footer>

    <script src="../js/calendario.js"></script>
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const closeBtn = document.getElementById('sidebar-close');
        menuToggle?.addEventListener('click', () => { sidebar.classList.add('active'); overlay.classList.add('active'); });
        overlay?.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
        closeBtn?.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
        const currentEmail = localStorage.getItem('currentUserEmail');
        if (currentEmail) { const u = JSON.parse(localStorage.getItem(currentEmail)); if (u) document.getElementById('user-name-header').textContent = u.fullname || u.email; }
    </script>
</body>
</html>
