<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - clockInTime</title>
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>

    <div class="form-container">
        <h2><i class="fas fa-clock"></i> clockInTime</h2>
        <p>Introduce tu email para recuperar el acceso</p>

        <form id="forgot-form">
            <div class="form-group">
                <label for="recover-email"><i class="fas fa-envelope"></i> Email de tu cuenta</label>
                <input type="email" id="recover-email" placeholder="tucorreo@empresa.com" required>
            </div>
            <button type="button" id="btn-recover-submit" class="btn-submit">Recuperar Contraseña</button>
        </form>

        <div class="extra-links">
            <p><a href="login.html">← Volver al inicio de sesión</a></p>
        </div>
    </div>

    <footer class="legal-footer">
        <a href="../legal/terminos-servicio.html">Términos de Servicio</a>
        <a href="../legal/politica-privacidad.html">Política de Privacidad</a>
        <a href="../legal/politica-cookies.html">Política de Cookies</a>
    </footer>

    <script>
        // Script de recuperación de contraseña
        // (muestra la contraseña del usuario si existe en localStorage)
        const btnRecover = document.getElementById('btn-recover-submit');
        const emailInput = document.getElementById('recover-email');

        btnRecover.addEventListener('click', function() {
            const email = emailInput.value.trim();
            if (!email) {
                alert('Por favor introduce tu email.');
                return;
            }
            const userData = localStorage.getItem(email);
            if (!userData) {
                alert('No encontramos ninguna cuenta con ese email.');
                return;
            }
            const user = JSON.parse(userData);
            alert('Tu contraseña es: ' + user.password + '\n\nPor favor cámbiala tras iniciar sesión.');
        });
    </script>
</body>
</html>
