<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - clockInTime</title>
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>

    <div class="form-container">
        <h2><i class="fas fa-clock"></i> clockInTime</h2>
        <p>Crea tu cuenta para empezar</p>

        <form id="register-form">
            <div class="form-group">
                <label for="fullname"><i class="fas fa-user"></i> Nombre Completo *</label>
                <input type="text" id="fullname" placeholder="Tu nombre completo" required>
            </div>
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email *</label>
                <input type="email" id="email" placeholder="tucorreo@empresa.com" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Contraseña *</label>
                <input type="password" id="password" placeholder="Mínimo 4 caracteres" required>
            </div>

            <hr style="margin: 1rem 0; border-color: #eee;">
            <p style="font-size:0.85rem; color:#666; margin-bottom:0.5rem;">
                Rellena <strong>solo uno</strong> de los dos campos siguientes:
            </p>

            <div class="form-group">
                <label for="company"><i class="fas fa-building"></i> Nombre de tu Empresa <small>(si eres jefe)</small></label>
                <input type="text" id="company" placeholder="Ej. Mi Empresa S.L.">
            </div>
            <div class="form-group">
                <label for="company-code"><i class="fas fa-key"></i> Código de Empresa <small>(si eres empleado)</small></label>
                <input type="text" id="company-code" placeholder="Código que te dio tu jefe">
            </div>

            <button type="button" id="btn-register-submit" class="btn-submit">Crear Cuenta</button>
        </form>

        <div class="extra-links">
            <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
        </div>
    </div>

    <footer class="legal-footer">
        <a href="../legal/terminos-servicio.html">Términos de Servicio</a>
        <a href="../legal/politica-privacidad.html">Política de Privacidad</a>
        <a href="../legal/politica-cookies.html">Política de Cookies</a>
    </footer>

    <script src="../js/registrer.js"></script>
</body>
</html>
