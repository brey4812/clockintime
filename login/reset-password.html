<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - clockInTime</title>
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="form-container">
        <h2><i class="fas fa-lock"></i> Nueva Contraseña</h2>
        <p>Escribe tu nueva contraseña a continuación.</p>

        <form id="reset-form">
            <div class="form-group">
                <label for="new-password"><i class="fas fa-key"></i> Nueva Contraseña</label>
                <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <button type="submit" class="btn-submit">Actualizar Contraseña</button>
        </form>

        <div class="extra-links">
            <p><a href="login.html">Volver al inicio de sesión</a></p>
        </div>
    </div>

    <script type="module" src="../js/reset-password.js"></script>
</body>
</html>
