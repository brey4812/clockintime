    <title>Iniciar Sesión - clockInTime</title>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <script type="application/ld+json">
    {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "ClockInTime",
    "operatingSystem": "Any",
    "applicationCategory": "BusinessApplication",
    "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "EUR"
    },
    "description": "Portal profesional de gestión de empleados, control horario y tareas para empresas.",
    "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "150"
        }
    }
    </script>

    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></noscript>
    <link rel="manifest" href="/manifest.json">
</head>
<body>

    <div class="form-container">
        <div style="text-align: right; margin-bottom: 10px;">
            <button type="button" id="theme-toggle-btn" style="background: none; border: none; cursor: pointer; color: var(--text-color);">
                <i class="fas fa-moon"></i>
            </button>
        </div>

        <h2>Bienvenido de nuevo</h2>
        <p>Inicia sesión para registrar tu jornada</p>

        <form id="login-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-user"></i> Email o Usuario</label>
                <input type="email" id="email" name="email" placeholder="tu@empresa.com" required>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
            </div>

            <button type="submit" id="btn-login-submit" class="btn-submit">Acceder</button>

            <div class="extra-links">
                <p>¿Aún no tienes cuenta? <a id="link-register" href="register.html">Regístrate</a></p>
                <p><a id="link-forgot-password" href="forgot-password.html">¿Has olvidado tu contraseña?</a></p>
            </div>
        </form>
    </div>

    <footer class="legal-footer">
        <a href="../legal/terminos-servicio.html">Términos de Servicio</a>
        <a href="../legal/politica-cookies.html">Política de Privacidad</a>
        <a href="../legal/politica-cookies.html">Política de Cookies</a>
    </footer>

    <script type="module" src="../js/login.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
