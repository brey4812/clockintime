<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - clockInTime</title>
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>

    <div class="form-container">
        <h2><i class="fas fa-clock"></i> clockInTime</h2>
        <p>Introduce tus credenciales para acceder</p>

        <form id="login-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-user"></i> Email o Nombre de Usuario</label>
                <input type="text" id="email" placeholder="tucorreo@empresa.com" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="password" placeholder="Tu contraseña" required>
            </div>
            <button type="button" id="btn-login-submit" class="btn-submit">Iniciar Sesión</button>
        </form>

        <div class="extra-links">
            <p><a href="forgot-password.html">¿Olvidaste tu contraseña?</a></p>
            <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
        </div>
    </div>

    <footer class="legal-footer">
        <a href="../legal/terminos-servicio.html">Términos de Servicio</a>
        <a href="../legal/politica-privacidad.html">Política de Privacidad</a>
        <a href="../legal/politica-cookies.html">Política de Cookies</a>
    </footer>

    <script src="../js/login.js"></script>
</body>
</html>
