<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Administración de usuarios de clockInTime. Gestiona altas, bajas, edición de perfiles y asignación de roles y permisos.">
    <meta name="keywords" content="clockInTime, usuarios, administración, roles, permisos, empleados">
    <meta name="author" content="clockInTime">
    <meta name="theme-color" content="#0056b3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Gestión de Usuarios - clockInTime">
    <meta property="og:description" content="Administración de usuarios de clockInTime. Gestiona altas, bajas, edición de perfiles y asignación de roles y permisos.">
    <meta property="og:image" content="https://iili.io/fzg2rNt.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Gestión de Usuarios - clockInTime">
    <meta name="twitter:description" content="Administración de usuarios de clockInTime. Gestiona altas, bajas, edición de perfiles y asignación de roles y permisos.">
    <meta name="twitter:image" content="https://iili.io/fzg2rNt.png">
    <title>Gestión de Usuarios - clockInTime</title>
    <link rel="stylesheet" href="../CSS/app-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="app-container">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="admin-dashboard.html" class="logo">clockInTime <span class="admin-badge">Admin</span></a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="admin-dashboard.html"><i class="fas fa-shield-alt"></i> Dashboard</a></li>
                    <li><a href="admin-gestion-usuarios.html" class="active"><i class="fas fa-users-cog"></i> Gestión de Usuarios</a></li>
                    <li><a href="admin-solicitudes.html"><i class="fas fa-calendar-check"></i> Solicitudes</a></li>
                    <li><a href="admin-calendario.html"><i class="fas fa-calendar-week"></i> Calendario</a></li>
                    <li><a href="admin-configuracion.html"><i class="fas fa-cogs"></i> Configuración</a></li>
                    <li><a href="admin-mi-perfil.html"><i class="fas fa-user"></i> Mi Perfil</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="../login/login.html"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <h1>Gestión de Usuarios</h1>
                </div>
                <div class="user-info"><strong id="user-name-header">Admin</strong></div>
            </header>

            <div class="widget">
                <div class="widget-header">
                    <h2>Empleados de la empresa</h2>
                    <button id="btn-anadir-usuario" class="btn-primary-app" style="padding:0.5rem 1rem;font-size:0.9rem;">
                        <i class="fas fa-plus"></i> Añadir Usuario
                    </button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Foto</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="usuarios-tbody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Añadir / Editar Usuario -->
    <div class="modal-overlay modal-hidden" id="modal-usuario">
        <div class="modal-content">
            <button id="btn-cerrar-modal-usuario" class="modal-close"><i class="fas fa-times"></i></button>
            <h2 id="modal-usuario-titulo">Añadir Usuario</h2>
            <form id="form-usuario-modal">
                <div class="form-group-app">
                    <label for="modal-input-nombre">Nombre Completo *</label>
                    <input type="text" id="modal-input-nombre" placeholder="Nombre completo" required>
                </div>
                <div class="form-group-app">
                    <label for="modal-input-email">Email *</label>
                    <input type="email" id="modal-input-email" placeholder="correo@empresa.com" required>
                </div>
                <div class="form-group-app">
                    <label for="modal-input-rol">Rol</label>
                    <select id="modal-input-rol">
                        <option value="empleado">Empleado</option>
                        <option value="jefe">Jefe / Admin</option>
                    </select>
                </div>
                <div class="form-group-app">
                    <label for="modal-input-password">Contraseña <small>(dejar vacío para mantener la actual)</small></label>
                    <input type="password" id="modal-input-password" placeholder="Por defecto: 1234">
                </div>
                <button type="submit" class="btn-primary-app" style="margin-top:0.5rem;">Guardar</button>
            </form>
        </div>
    </div>

    <footer class="legal-footer">
        <a href="../legal/terminos-servicio.html">Términos de Servicio</a>
        <a href="../legal/politica-privacidad.html">Política de Privacidad</a>
        <a href="../legal/politica-cookies.html">Política de Cookies</a>
    </footer>

    <script src="../js/admin-gestion-usuarios.js"></script>
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar    = document.getElementById('sidebar');
        const overlay    = document.getElementById('sidebar-overlay');
        menuToggle?.addEventListener('click', () => { sidebar.classList.add('active'); overlay.classList.add('active'); });
        overlay?.addEventListener('click',   () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
    </script>
</body>
</html>
