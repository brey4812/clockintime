<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    
    <title>Gestión de Usuarios - clockInTime</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Panel de gestión de empleados y roles para administradores de clockInTime.">
    <meta name="author" content="clockInTime">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#0056b3">

    <meta property="og:title" content="Gestión de Usuarios - clockInTime">
    <meta property="og:description" content="Administra tu equipo de trabajo de forma eficiente.">
    <meta property="og:image" content="https://iili.io/fzg2rNt.png">
    <meta property="og:type" content="website">

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <link rel="stylesheet" href="../CSS/app-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="admin-dashboard.html" class="logo">
                    clockInTime <span class="admin-badge">Admin</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="admin-dashboard.html"><i class="fas fa-shield-alt"></i> Dashboard</a></li>
                    <li><a href="admin-gestion-usuarios.html" class="active"><i class="fas fa-users-cog"></i> Gestión de Usuarios</a></li>
                    <li><a href="admin-solicitudes.html"><i class="fas fa-calendar-check"></i> Solicitudes</a></li>
                    <li><a href="admin-calendario.html"><i class="fas fa-calendar-week"></i> Calendario</a></li>
                    <li><a href="admin-configuracion.html"><i class="fas fa-cogs"></i> Configuración</a></li>
                    <li><a href="admin-mi-perfil.html"><i class="fas fa-user"></i> Mi Perfil</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="btn-logout-admin"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <h1>Gestión de Usuarios</h1>
                </div>
                <div class="user-info">
                    <strong id="user-name-header">Cargando...</strong>
                </div>
            </header>

            <section class="widget">
                <div class="widget-header">
                    <h2>Empleados de tu empresa</h2>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Foto</th>
                                <th>Nombre completo</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="usuarios-tbody">
                            <tr>
                                <td colspan="5" class="text-center">Conectando con el servidor...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="../js/admin-gestion-usuarios.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuToggle = document.getElementById('menu-toggle');
            const menuClose = document.getElementById('menu-close');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            function toggleMenu() {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            }

            menuToggle?.addEventListener('click', toggleMenu);
            menuClose?.addEventListener('click', toggleMenu);
            overlay?.addEventListener('click', toggleMenu);
        });
    </script>
</body>
</html>
