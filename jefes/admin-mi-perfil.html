<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - clockInTime Admin</title>
    <link rel="stylesheet" href="../CSS/app-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="app-container">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="admin-dashboard.html" class="logo">clockInTime <span class="admin-badge">Admin</span></a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="admin-dashboard.html"><i class="fas fa-shield-alt"></i> Dashboard</a></li>
                    <li><a href="admin-gestion-usuarios.html"><i class="fas fa-users-cog"></i> Gestión de Usuarios</a></li>
                    <li><a href="admin-solicitudes.html"><i class="fas fa-calendar-check"></i> Solicitudes</a></li>
                    <li><a href="admin-calendario.html"><i class="fas fa-calendar-week"></i> Calendario</a></li>
                    <li><a href="admin-configuracion.html"><i class="fas fa-cogs"></i> Configuración</a></li>
                    <li><a href="admin-mi-perfil.html" class="active"><i class="fas fa-user"></i> Mi Perfil</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="../login/login.html"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="menu-toggle-btn" id="menu-toggle"><i class="fas fa-bars"></i></button>
                    <h1>Mi Perfil de Administrador</h1>
                </div>
                <div class="user-info"><strong id="user-name-header">Admin</strong></div>
            </header>

            <div class="page-grid-solicitudes">

                <div class="widget">
                    <h2>Datos Personales</h2>
                    <form id="profile-form">
                        <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:1.5rem;">
                            <div class="profile-pic-display" id="profile-pic-preview">
                                <i class="fas fa-user" style="font-size:3rem;color:#94a3b8;"></i>
                            </div>
                            <div style="display:flex;gap:0.5rem;margin-top:0.75rem;">
                                <button type="button" id="btn-upload-pic" class="btn-filter">Cambiar foto</button>
                                <input type="file" id="input-pic-upload" accept="image/*" style="display:none;">
                                <button type="button" id="btn-remove-pic" class="btn-filter"
                                    style="background:#dc3545;color:#fff;border-color:#dc3545;">Quitar</button>
                            </div>
                        </div>
                        <div class="form-group-app">
                            <label for="fullname">Nombre Completo</label>
                            <input type="text" id="fullname" placeholder="Tu nombre">
                        </div>
                        <div class="form-group-app">
                            <label for="email">Email</label>
                            <input type="email" id="email" disabled>
                        </div>
                        <div class="form-group-app">
                            <label for="role">Rol</label>
                            <input type="text" id="role" value="Administrador" disabled>
                        </div>
                        <button id="btn-save-profile" type="submit" class="btn-primary-app">Guardar Cambios</button>
                    </form>
                </div>

                <div class="widget">
                    <h2>Cambiar Contraseña</h2>
                    <form id="password-form">
                        <div class="form-group-app">
                            <label for="current-password">Contraseña Actual</label>
                            <input type="password" id="current-password" placeholder="Contraseña actual" required>
                        </div>
                        <hr style="margin:1rem 0;border-color:#e2e8f0;">
                        <div class="form-group-app">
                            <label for="new-password">Nueva Contraseña</label>
                            <input type="password" id="new-password" placeholder="Mínimo 4 caracteres" required>
                        </div>
                        <div class="form-group-app">
                            <label for="repeat-password">Repetir Nueva Contraseña</label>
                            <input type="password" id="repeat-password" placeholder="Repite la nueva contraseña" required>
                        </div>
                        <button id="btn-update-password" type="submit" class="btn-primary-app">Actualizar Contraseña</button>
                    </form>
                </div>

            </div>
        </main>
    </div>

    <footer class="legal-footer">
        <a href="../legal/terminos-servicio.html">Términos de Servicio</a>
        <a href="../legal/politica-privacidad.html">Política de Privacidad</a>
        <a href="../legal/politica-cookies.html">Política de Cookies</a>
    </footer>

    <script src="../js/admin-mi-perfil.js"></script>
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar    = document.getElementById('sidebar');
        const overlay    = document.getElementById('sidebar-overlay');
        menuToggle?.addEventListener('click', () => { sidebar.classList.add('active'); overlay.classList.add('active'); });
        overlay?.addEventListener('click',   () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
    </script>
</body>
</html>
