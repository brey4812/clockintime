<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edita y gestiona los datos de tu perfil de administrador en clockInTime.">
    <meta name="keywords" content="clockInTime, administrador, perfil, datos personales, ajustes de admin">
    <meta name="author" content="clockInTime">
    <meta name="theme-color" content="#0056b3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="Mi Perfil - clockInTime Admin">
    <meta property="og:description" content="Edita y gestiona los datos de tu perfil de administrador en clockInTime.">
    <meta property="og:image" content="https://iili.io/fzg2rNt.png">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Mi Perfil - clockInTime Admin">
    <meta name="twitter:description" content="Edita y gestiona los datos de tu perfil de administrador en clockInTime.">
    <meta name="twitter:image" content="https://iili.io/fzg2rNt.png">

    <title>Mi Perfil - clockInTime Admin</title>
    
    <link rel="stylesheet" href="../CSS/app-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="../js/theme.js"></script>
    
    <style>
        /* Estilos para el Avatar Circular */
        #profile-pic-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid var(--border-color);
            background-color: var(--bg-secondary);
            bottom: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
        }
        #profile-pic-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #profile-pic-preview i {
            font-size: 3.5rem;
            color: #94a3b8;
        }
        /* Contenedor de la URL externa */
        .url-input-group {
            margin-top: 1.5rem;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .url-input-wrapper {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }
        .url-input-wrapper input {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: var(--bg-primary);
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="admin-dashboard.html" class="logo">clockInTime <span class="admin-badge">Admin</span></a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="admin-dashboard.html"><i class="fas fa-shield-alt"></i> Dashboard</a></li>
                    <li><a href="admin-gestion-usuarios.html"><i class="fas fa-users-cog"></i> Gestión de Usuarios</a></li>
                    <li><a href="admin-solicitudes.html"><i class="fas fa-calendar-check"></i> Solicitudes</a></li>
                    <li><a href="admin-calendario.html"><i class="fas fa-calendar-week"></i> Calendario</a></li>
                    <li><a href="admin-configuracion.html"><i class="fas fa-cogs"></i> Configuración</a></li>
                    <li><a href="admin-mi-perfil.html" class="active"><i class="fas fa-user"></i> Mi Perfil</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="btn-logout-admin"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <h1>Mi Perfil de Administrador</h1>
                </div>
                <div class="user-info">Bienvenido, <strong id="user-name-header">Cargando...</strong></div>
            </header>

            <div class="page-grid-solicitudes">
                <div class="widget">
                    <h2>Datos Personales</h2>
                    <form id="form-mi-perfil">
                        <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:1.5rem;">
                            <div id="profile-pic-preview">
                                <img id="profile-avatar-preview" src="https://iili.io/fzg2rNt.png" alt="Avatar">
                            </div>
                            
                            <div style="display:flex;gap:0.5rem;">
                                <button type="button" id="btn-upload-pic" class="btn-filter" onclick="document.getElementById('admin-avatar-file').click()">Subir foto local</button>
                                <input type="file" id="admin-avatar-file" accept="image/*" style="display:none;">
                            </div>

                            <div class="url-input-group">
                                <label style="font-size: 0.8rem; color: var(--text-light);">¿Tienes una URL de icono? Pégala aquí:</label>
                                <div class="url-input-wrapper">
                                    <input type="url" id="avatar-url-input" placeholder="https://ejemplo.com/foto.png">
                                    <button type="button" id="btn-apply-url" class="btn-filter" style="background: #4f46e5; color: white;"><i class="fas fa-check"></i></button>
                                </div>
                            </div>
                        </div>

                        <div class="form-group-app">
                            <label for="admin-fullname">Nombre</label>
                            <input type="text" id="admin-fullname" placeholder="Tu nombre" required>
                        </div>
                        <div class="form-group-app">
                            <label for="admin-lastname">Apellido</label>
                            <input type="text" id="admin-lastname" placeholder="Tu apellido">
                        </div>
                        <div class="form-group-app">
                            <label for="admin-email">Email (No editable)</label>
                            <input type="email" id="admin-email" disabled style="background: var(--bg-secondary); cursor: not-allowed;">
                        </div>
                        <div class="form-group-app">
                            <label for="admin-empresa">Empresa</label>
                            <input type="text" id="admin-empresa" disabled style="background: var(--bg-secondary); cursor: not-allowed;">
                        </div>
                        <div class="form-group-app">
                            <label for="admin-rol">Rol</label>
                            <input type="text" id="admin-rol" disabled style="background: var(--bg-secondary); cursor: not-allowed;">
                        </div>
                        <button type="submit" class="btn-primary-app">Guardar Cambios de Texto</button>
                    </form>
                </div>

                <div class="widget">
                    <h2>Seguridad</h2>
                    <form id="password-form">
                        <div class="form-group-app">
                            <label for="new-password">Nueva Contraseña</label>
                            <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" required>
                        </div>
                        <div class="form-group-app">
                            <label for="repeat-password">Repetir Contraseña</label>
                            <input type="password" id="repeat-password" placeholder="Repite la contraseña" required>
                        </div>
                        <button id="btn-update-password" type="submit" class="btn-primary-app">Actualizar Contraseña</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <footer class="legal-footer">
        <a href="../legal/terminos-servicio.html">Términos</a>
        <a href="../legal/politica-privacidad.html">Privacidad</a>
    </footer>

    <script type="module" src="../js/admin-mi-perfil.js"></script>
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        
        menuToggle?.addEventListener('click', () => { 
            sidebar.classList.add('active'); 
            overlay.classList.add('active'); 
        });
        
        overlay?.addEventListener('click', () => { 
            sidebar.classList.remove('active'); 
            overlay.classList.remove('active'); 
        });
    </script>
</body>
</html>
